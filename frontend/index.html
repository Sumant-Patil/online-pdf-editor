<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Online PDF Editor</title>
  <link rel="stylesheet" href="index.css">
  <!-- TinyMCE -->
  <script src="https://cdn.tiny.cloud/1/9kisdrhucd5ucfcty8zbaafor642af4plkg03ov84dx15jfd/tinymce/7/tinymce.min.js"></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="top">
      <h1>Online PDF Editor</h1>
      <p>Upload PDF → Convert → Edit → Download or Compress</p>
    </header>

    <main class="card">
      <div class="upload-area">
        <input id="fileInput" type="file" accept=".pdf" />
        <div class="buttons">
          <button id="uploadBtn">Upload & Convert</button>
          <button id="downloadDocxBtn" style="display:none;">Download DOCX</button>
        </div>
        <p id="status"></p>
      </div>

      <section id="editor-section" class="editor-section hidden">
        <h2>Edit Document</h2>
        <textarea id="editor"></textarea>
        <div class="editor-actions">
          <button id="saveBtn">Save & Convert to PDF</button>
          <button id="compressBtn">Compress Last PDF</button>
        </div>
      </section>
    </main>

    <footer class="foot">
      <small>Made with ❤️ by Sumant Patil</small>
    </footer>
  </div>

  <script src="index.js"></script>
</body>
</html>
