<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Online PDF Editor</title>

  <link rel="stylesheet" href="index.css"/>

  <!-- TinyMCE FREE CDN -->
  <script src="https://cdn.jsdelivr.net/npm/tinymce@7/tinymce.min.js"></script>

  <!-- Mammoth -->
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>

  <div class="app">

    <header class="top">
      <h1>Online PDF Editor</h1>
      <p>Upload PDF → Edit → Download PDF</p>
    </header>

    <main class="card">

      <div class="upload-area">

        <input
          id="fileInput"
          type="file"
          accept=".pdf"
        />

        <div class="buttons">
          <button id="uploadBtn">
            Upload & Convert
          </button>

          <button
            id="downloadDocxBtn"
            style="display:none;"
          >
            Download DOCX
          </button>
        </div>

        <p id="status"></p>

      </div>

      <section
        id="editor-section"
        class="editor-section hidden"
      >

        <h2>Edit Document</h2>

        <textarea id="editor"></textarea>

        <div class="editor-actions">

          <button id="saveBtn">
            Save & Convert to PDF
          </button>

          <button id="compressBtn">
            Compress Last PDF
          </button>

        </div>

      </section>

    </main>

  </div>

  <script>
    tinymce.init({
      selector: '#editor',
      height: 500,
      menubar: true,

      plugins: [
        'lists',
        'link',
        'image',
        'table',
        'code'
      ],

      toolbar:
        'undo redo | ' +
        'bold italic underline | ' +
        'alignleft aligncenter alignright | ' +
        'bullist numlist | ' +
        'table | code',

      branding: false,

      promotion: false
    });
  </script>

  <script src="index.js"></script>

</body>
</html>
